name: Release

# Publishes a self-contained, single-file Windows executable and attaches it to a
# GitHub Release. Trigger by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
        default: '0.2.0'

permissions:
  contents: write

jobs:
  release:
    name: Publish single-file exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $raw = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ github.event.inputs.version }}' } else { '${{ github.ref_name }}' }
          $num = $raw.TrimStart('v')
          echo "num=$num" >> $env:GITHUB_OUTPUT
          echo "tag=v$num" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained, single file)
        shell: pwsh
        run: >
          dotnet publish src/DisplayDeck.App/DisplayDeck.App.csproj
          -c Release
          -r win-x64
          -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.num }}
          -o publish

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish/DisplayDeck.exe "dist/DisplayDeck-${{ steps.ver.outputs.tag }}-win-x64.exe"
          Get-ChildItem dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: DisplayDeck-${{ steps.ver.outputs.tag }}-win-x64
          path: dist/*.exe

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: DisplayDeck ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: dist/*.exe
